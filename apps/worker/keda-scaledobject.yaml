apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: worker-sqs-auth
  namespace: logiflow
spec:
  podIdentity:
    provider: aws
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker
  namespace: logiflow
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: worker-sqs-auth
      metadata:
        queueURL: "REPLACE_WITH_QUEUE_URL"
        awsRegion: "us-east-1"
        awsAccountID: "REPLACE_WITH_ACCOUNT_ID"
        queueLength: "10"
        scaleOnInFlight: "true"
